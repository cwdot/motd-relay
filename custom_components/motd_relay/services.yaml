clear:
  name: Clear MOTD
  description: >-
    Drop the retained MOTD message for the given service/source by
    publishing an empty retained payload to its topic. At least one of
    `service` or `source` must be set.
  fields:
    service:
      name: Service
      example: homeassistant
      selector:
        text:
    source:
      name: Source
      example: front_door
      selector:
        text:
